<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/logo-white.png" type="image/png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.19.0/mapbox-gl.css" rel="stylesheet" />
    <!-- Poppins Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Jost:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <meta
      name="description"
      content="IPM - International Property Market. Manage your portfolio, track leads, and leverage AI-driven tools for global property exposure."
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo-white.png" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>IPM - International Property Market</title>
    <!-- Google Analytics loads only after cookie consent (see CookieConsent component) -->

    <!-- Google Translate: hidden widget, controlled programmatically by language selector -->
    <style>
      /* Hide Google Translate toolbar, badge, and the persistent "Translated into" iframe at top */
      .goog-te-banner-frame,
      .goog-te-banner-frame.skiptranslate,
      iframe.goog-te-banner-frame,
      .goog-te-gadget,
      #goog-gt-tt,
      .goog-te-balloon-frame,
      .goog-tooltip,
      .goog-tooltip:hover,
      .skiptranslate iframe[name="serviceTranslateBackend"] { display: none !important; visibility: hidden !important; }
      /* Force body to its natural top position even when Google injects margin/transform */
      html, body { top: 0 !important; position: static !important; }
      body.translated-ltr,
      body.translated-rtl { margin-top: 0 !important; top: 0 !important; }
      /* Hide the "Translated by Google" tooltip and original-text wrapper */
      .goog-te-menu-value:hover { text-decoration: none !important; }
      font#goog-gt-original-text { display: none !important; }
      /* Some Chrome versions inject a tooltip element on hover */
      .goog-text-highlight { background: transparent !important; box-shadow: none !important; }
    </style>
  </head>
  <body>
    <!-- Hidden Google Translate element — do not remove -->
    <div id="google_translate_element" style="display:none;visibility:hidden;position:absolute;"></div>

    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

    <!-- Google Translate init — must be after body opens -->
    <script>
      window.__ipmGoogleTranslateReady = false;
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'en',
          autoDisplay: false,
          gaTrack: false,
        }, 'google_translate_element');
        window.__ipmGoogleTranslateReady = true;
        // If a language was queued before the script loaded, apply it now
        if (window.__ipmPendingLang) {
          window.__ipmApplyGoogleTranslate(window.__ipmPendingLang);
        }
      }

      // Language code mapping (our codes → Google codes)
      var GOOGLE_LANG_MAP = {
        'zh': 'zh-CN', 'en': 'en',
        'es': 'es', 'fr': 'fr', 'ar': 'ar',
        'de': 'de', 'nl': 'nl', 'pt': 'pt',
        'it': 'it', 'ja': 'ja', 'tr': 'tr',
        'ru': 'ru', 'hi': 'hi'
      };

      window.__ipmApplyGoogleTranslate = function(lang) {
        if (!window.__ipmGoogleTranslateReady) {
          window.__ipmPendingLang = lang;
          return;
        }
        var googleLang = GOOGLE_LANG_MAP[lang] || lang;
        if (lang === 'en') {
          // Restore original English
          var restoreEl = document.querySelector('.goog-te-banner-frame');
          if (restoreEl) {
            try {
              var restoreBtn = restoreEl.contentDocument
                ? restoreEl.contentDocument.querySelector('[id="restore"]')
                : null;
              if (restoreBtn) restoreBtn.click();
            } catch(e) {}
          }
          // Clear cookie and reload to fully restore
          document.cookie = 'googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;';
          document.cookie = 'googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/; domain=' + location.hostname + ';';
          return;
        }
        // Set cookie so translation persists across SPA navigation
        document.cookie = 'googtrans=/en/' + googleLang + '; path=/;';
        document.cookie = 'googtrans=/en/' + googleLang + '; path=/; domain=' + location.hostname + ';';
        // Trigger Google Translate via its hidden select element
        var tryTranslate = function(attempts) {
          var select = document.querySelector('.goog-te-combo');
          if (select) {
            select.value = googleLang;
            select.dispatchEvent(new Event('change'));
          } else if (attempts > 0) {
            setTimeout(function() { tryTranslate(attempts - 1); }, 200);
          }
        };
        tryTranslate(10);
      };
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit" async></script>

      To begin the development, run `npm start` or `yarn start`.
      To create a production bundle, use `npm run build` or `yarn build`.
    -->
  </body>
</html>
