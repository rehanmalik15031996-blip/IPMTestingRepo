<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/logo-white.png" type="image/png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />

    <!--
      Cross-origin error filter. Must be the FIRST script so its capture-phase
      'error' listener is registered before react-error-overlay (CRA dev) attaches
      its own. The Google Translate widget loads from translate.google.com without
      CORS, so any error inside its script reaches us as the browser-sanitized
      "Script error." with no filename/lineno. These cannot be debugged from our
      code and they trigger CRA's red runtime-error overlay only in dev mode
      (they never appear in production builds). We swallow ONLY:
        - the literal "Script error." (always cross-origin third-party)
        - errors whose source/stack points at translate.google(apis).com
      All other errors propagate normally to the overlay and console.
    -->
    <script>
      (function () {
        var TRANSLATE_RE = /translate\.google(?:apis)?\.com|translate_a\/element/i;
        function looksLikeTranslateNoise(message, source) {
          if (typeof message === 'string' && (message === 'Script error.' || message === 'Script error')) return true;
          if (typeof source === 'string' && TRANSLATE_RE.test(source)) return true;
          return false;
        }
        window.addEventListener('error', function (e) {
          try {
            var src = (e && e.filename) || (e && e.target && e.target.src) || '';
            var err = e && e.error;
            var stack = err && err.stack;
            if (
              looksLikeTranslateNoise(e && e.message, src) ||
              (typeof stack === 'string' && TRANSLATE_RE.test(stack))
            ) {
              if (typeof e.stopImmediatePropagation === 'function') e.stopImmediatePropagation();
              if (typeof e.preventDefault === 'function') e.preventDefault();
              return false;
            }
          } catch (_) { /* swallow */ }
        }, true);
        window.addEventListener('unhandledrejection', function (e) {
          try {
            var reason = e && e.reason;
            var msg = reason && (reason.message || (reason.toString && reason.toString()));
            var stack = reason && reason.stack;
            if (
              (typeof msg === 'string' && TRANSLATE_RE.test(msg)) ||
              (typeof stack === 'string' && TRANSLATE_RE.test(stack))
            ) {
              if (typeof e.stopImmediatePropagation === 'function') e.stopImmediatePropagation();
              if (typeof e.preventDefault === 'function') e.preventDefault();
              return false;
            }
          } catch (_) { /* swallow */ }
        }, true);
      })();
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.19.0/mapbox-gl.css" rel="stylesheet" />
    <!-- Poppins Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Jost:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <meta
      name="description"
      content="IPM - International Property Market. Manage your portfolio, track leads, and leverage AI-driven tools for global property exposure."
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo-white.png" />

    <title>IPM - International Property Market</title>
    <!-- Google Analytics loads only after cookie consent (see CookieConsent component) -->

    <!-- Set <html lang> from stored preference at the earliest possible moment so Chrome's
         built-in translation feature doesn't detect a "foreign" page and pop up its own
         translate prompt (separate from our Google Translate widget).
         Also pre-fills __ipmPendingLang so that as soon as googleTranslateElementInit
         fires (Google script loaded), it immediately translates to the stored language
         without waiting for the user to interact with the picker. This is what makes
         the body content translate on Vercel page load (not just the header via i18n). -->
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('ipm_user_preferences');
          if (!raw) return;
          var p = JSON.parse(raw);
          // Only restore a non-English language if the user explicitly chose it.
          // Without the flag (old sessions / fresh installs) default to English so
          // the browser never detects a "foreign" page and pops up its translate bar.
          if (p && p.language && p.languageExplicitlySet) {
            document.documentElement.lang = p.language;
            var RTL = { ar: 1, he: 1, ur: 1, fa: 1 };
            if (RTL[p.language]) document.documentElement.dir = 'rtl';
            // Queue the stored language for Google Translate so the body translates
            // automatically on page load — not only when the user clicks the picker.
            if (p.language !== 'en') {
              window.__ipmPendingLang = p.language;
            }
          }
        } catch (_) {}
      })();
    </script>

    <!-- Google Translate: hidden widget, controlled programmatically by language selector -->
    <style>
      /* ── Hide ALL Google Translate UI chrome ──────────────────────────────────────
         Worker iframes (translation engine) are kept; only visible UI is suppressed.
         Google uses both stable class names (goog-te-*) and obfuscated ones (VIpgJd-*)
         that change between releases — we target both sets plus positional selectors. */

      /* Banner "Translated by Google" top bar */
      .goog-te-banner-frame,
      .goog-te-banner-frame.skiptranslate,
      iframe.goog-te-banner-frame,
      /* Gadget wrapper (contains the combo & floating icon) */
      .goog-te-gadget,
      /* Floating translate icon/bubble (stable id) */
      #goog-gt-tt,
      /* Balloon tooltip */
      .goog-te-balloon-frame,
      /* Inline tooltip on hover */
      .goog-tooltip,
      .goog-tooltip:hover,
      /* Obfuscated class Google uses for the floating "G" icon bubble.
         Use div/span qualifiers — NEVER target iframe.VIpgJd-* because those
         are the off-screen worker iframes that perform the actual translation. */
      div[class*="VIpgJd-"],
      span[class*="VIpgJd-"],
      /* The outermost floating button wrapper Google injects into <body>.
         Scoped to div/span only — iframes with skiptranslate are worker iframes
         and must NOT be hidden or translation stops working entirely. */
      body > div.skiptranslate:not(#google_translate_element),
      body > span.skiptranslate:not(#google_translate_element),
      /* Any fixed/absolute div element Google injects that wraps the icon */
      body > div[id^="goog-gt"] {
        display: none !important;
        visibility: hidden !important;
        height: 0 !important;
        max-height: 0 !important;
        opacity: 0 !important;
        pointer-events: none !important;
        overflow: hidden !important;
      }

      /* Force body to its natural top position even when Google injects margin/transform */
      html { margin-top: 0 !important; }
      html body,
      html body.translated-ltr,
      html body.translated-rtl {
        top: 0 !important;
        margin-top: 0 !important;
        position: static !important;
      }

      /* Hide the "Translated by Google" tooltip and original-text wrapper */
      .goog-te-menu-value:hover { text-decoration: none !important; }
      font#goog-gt-original-text { display: none !important; }

      /* Suppress highlight box Google draws on translated text on hover */
      .goog-text-highlight { background: transparent !important; box-shadow: none !important; }
    </style>
  </head>
  <body>
    <!-- Hidden Google Translate element — do not remove -->
    <div id="google_translate_element" style="display:none;visibility:hidden;position:absolute;"></div>

    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

    <!-- Visually suppress only the Google Translate top "Translated into..." banner.
         IMPORTANT: do NOT remove Google's worker iframes from the DOM — they are required
         for translation to function. We hide ONLY the banner element (and its wrapper if any)
         and reset the body offset Google applies.
         Strategy: identify the banner by POSITION (an iframe pinned to the top of the viewport
         that belongs to Google's translate widget) rather than by class name, because Google
         frequently changes the obfuscated class names. Worker iframes are positioned off-screen
         (e.g. left: -10000px) so they don't match the "at top of viewport" predicate.
         All writes are IDEMPOTENT so the MutationObserver never retriggers itself. -->
    <script>
      (function () {
        console.log('[IPM] Google Translate banner hider v4 loaded');
        var HIDE_CSS = 'display: none !important; visibility: hidden !important; height: 0 !important; max-height: 0 !important; min-height: 0 !important; opacity: 0 !important; pointer-events: none !important; overflow: hidden !important;';

        function ensureHidden(el) {
          if (!el) return;
          if (el.style.display === 'none' && el.style.visibility === 'hidden') return;
          try { el.style.cssText = HIDE_CSS; } catch (_) {}
        }

        // A "translate-related" element is anything that belongs to Google's translate widget:
        // either has `skiptranslate` class, a `goog-te-*` class, or is the rendered banner.
        function isTranslateRelated(el) {
          if (!el || !el.classList) return false;
          if (el.classList.contains('skiptranslate')) return true;
          for (var i = 0; i < el.classList.length; i++) {
            var c = el.classList[i];
            if (c.indexOf('goog-te-') === 0 || c.indexOf('VIpgJd-') === 0) return true;
          }
          return false;
        }

        // The visible banner is positioned FIXED at the top of the viewport with full-ish width.
        // Translation worker iframes are position:absolute and pushed off-screen, so they
        // will NEVER match this predicate — safe to hide anything that does.
        function isAtTopOfViewport(el) {
          try {
            var cs = window.getComputedStyle(el);
            if (cs.position !== 'fixed') return false; // workers use absolute, not fixed
            var r = el.getBoundingClientRect();
            return r.top <= 5 && r.top >= -5 &&
                   r.height > 10 && r.height < 120 &&
                   r.width > 300;
          } catch (_) {
            return false;
          }
        }

        function hideBannerElements() {
          // Pass 1: known stable selectors (fastest path)
          document.querySelectorAll(
            '.goog-te-banner-frame, iframe.goog-te-banner-frame, .goog-te-balloon-frame, #goog-gt-tt, .goog-te-gadget'
          ).forEach(ensureHidden);

          // Pass 2: obfuscated VIpgJd-* elements (the floating "G" icon bubble)
          document.querySelectorAll('[class*="VIpgJd-"]').forEach(ensureHidden);

          // Pass 3: translate-related iframes pinned to the top of the viewport (banner).
          // Worker iframes are position:absolute pushed to left:-10000px so they are
          // never "at top of viewport" — this guard keeps them safe.
          document.querySelectorAll('iframe').forEach(function (iframe) {
            if (iframe.style.display === 'none') return; // already hidden
            if (!isTranslateRelated(iframe)) return;
            if (isAtTopOfViewport(iframe)) ensureHidden(iframe); // only visible banner iframes
          });

          // Pass 4: any direct body child (div/span wrapper) injected by Google.
          // IMPORTANT: skip iframes entirely — Google's worker iframes have the
          // skiptranslate class and are direct body children, but they are the
          // translation engine. Hiding them with display:none breaks translation.
          // Worker iframes are off-screen (left:-10000px, position:absolute) so
          // isAtTopOfViewport already wouldn't match them — but we skip tag=IFRAME
          // unconditionally here to be safe.
          if (document.body) {
            for (var i = 0; i < document.body.children.length; i++) {
              var child = document.body.children[i];
              if (child.id === 'google_translate_element') continue;
              if (child.id === 'root') continue;
              if (child.tagName === 'SCRIPT') continue;
              if (child.tagName === 'IFRAME') continue; // never hide — translation engine
              if (child.style && child.style.display === 'none') continue;
              // Hide floating icon wrapper: translate-related divs/spans only
              if (isTranslateRelated(child)) { ensureHidden(child); continue; }
              if (isAtTopOfViewport(child)) ensureHidden(child);
            }
          }
        }

        function resetBodyOffset() {
          if (document.body) {
            var bs = document.body.style;
            if (bs.top && bs.top !== '' && bs.top !== '0px' && bs.top !== 'auto') bs.top = '';
            if (bs.marginTop && bs.marginTop !== '' && bs.marginTop !== '0px') bs.marginTop = '';
            if (bs.position === 'relative') bs.position = '';
          }
          if (document.documentElement) {
            var hs = document.documentElement.style;
            if (hs.marginTop && hs.marginTop !== '' && hs.marginTop !== '0px') hs.marginTop = '';
          }
        }

        function tick() {
          hideBannerElements();
          resetBodyOffset();
        }

        tick();

        function startObserver() {
          if (!document.body) { return setTimeout(startObserver, 50); }
          var scheduled = false;
          var obs = new MutationObserver(function () {
            if (scheduled) return;
            scheduled = true;
            requestAnimationFrame(function () {
              scheduled = false;
              tick();
            });
          });
          obs.observe(document.documentElement, {
            childList: true,
            subtree: true,
            attributes: true,
            attributeFilter: ['style', 'class']
          });
          // Belt-and-braces: poll for ~6s while Google injects, then stop
          var ticks = 0;
          var iv = setInterval(function () {
            tick();
            if (++ticks > 30) clearInterval(iv);
          }, 200);
        }
        startObserver();
      })();
    </script>

    <!-- Google Translate init — must be after body opens -->
    <script>
      window.__ipmGoogleTranslateReady = false;
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'en',
          autoDisplay: false,
          gaTrack: false,
        }, 'google_translate_element');
        window.__ipmGoogleTranslateReady = true;
        // If a language was queued before the script loaded, apply it now
        if (window.__ipmPendingLang) {
          window.__ipmApplyGoogleTranslate(window.__ipmPendingLang);
        }
      }

      // Language code mapping (our codes → Google codes)
      var GOOGLE_LANG_MAP = {
        'zh': 'zh-CN', 'en': 'en',
        'es': 'es', 'fr': 'fr', 'ar': 'ar',
        'de': 'de', 'nl': 'nl', 'pt': 'pt',
        'it': 'it', 'ja': 'ja', 'tr': 'tr',
        'ru': 'ru', 'hi': 'hi'
      };

      function clearGoogTransCookie() {
        var host = location.hostname;
        var paths = ['/', ''];
        var domains = ['', '; domain=' + host, '; domain=.' + host];
        paths.forEach(function (p) {
          domains.forEach(function (d) {
            document.cookie = 'googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=' + p + d + ';';
          });
        });
      }

      function setGoogTransCookie(googleLang) {
        var host = location.hostname;
        document.cookie = 'googtrans=/en/' + googleLang + '; path=/;';
        document.cookie = 'googtrans=/en/' + googleLang + '; path=/; domain=' + host + ';';
      }

      // Completely removes Google Translate from the page. This is the only reliable
      // way to fully restore English in a React SPA without a reload:
      // - A simple select.value = '' restore leaves Google's MutationObserver alive,
      //   which re-translates any newly-mounted DOM nodes (e.g. on scroll, lazy-loaded
      //   routes) back to the previous language.
      // - By removing all worker iframes, scripts, and the widget mount, the observer
      //   is destroyed and the page reverts cleanly. When the user later picks a
      //   non-English language, we re-inject the script.
      window.__ipmTearDownGoogleTranslate = function() {
        try {
          // Remove Google Translate scripts injected by the widget
          document.querySelectorAll('script[src*="translate.google.com"], script[src*="translate.googleapis.com"], script[src*="translate_a/element"]').forEach(function (s) { s.remove(); });
          // Remove all Google Translate iframes (workers, banner, balloon)
          document.querySelectorAll('iframe.skiptranslate, iframe.goog-te-banner-frame, iframe.goog-te-menu-frame, iframe.goog-te-balloon-frame, iframe[class*="goog-te"]').forEach(function (i) { i.remove(); });
          // Remove any leftover Google Translate UI elements
          document.querySelectorAll('.goog-te-banner-frame, .goog-te-balloon-frame, #goog-gt-tt, .goog-tooltip, .goog-te-spinner-pos').forEach(function (e) { e.remove(); });
          // Reset the hidden mount point so the next init has a clean slate
          var mount = document.getElementById('google_translate_element');
          if (mount) mount.innerHTML = '';
          // Remove body translation state classes. Google's internal code checks these
          // to decide whether to keep translating — removing them signals "not translated".
          if (document.body) {
            document.body.classList.remove('translated-ltr', 'translated-rtl');
          }
          // Clear globals so the next non-English switch knows to re-inject the script
          window.__ipmGoogleTranslateReady = false;
          try {
            if (window.google) {
              delete window.google.translate;
            }
          } catch (e) {}
        } catch (e) {}
      };

      window.__ipmLoadGoogleTranslateScript = function() {
        // Idempotent: don't re-inject if already loaded or in progress
        if (document.querySelector('script[data-ipm-gt-loader="1"]')) return;
        var s = document.createElement('script');
        s.src = '//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit';
        s.async = true;
        s.setAttribute('data-ipm-gt-loader', '1');
        document.head.appendChild(s);
      };

      window.__ipmApplyGoogleTranslate = function(lang) {
        var googleLang = GOOGLE_LANG_MAP[lang] || lang;

        if (lang === 'en') {
          // Clear the translate cookie so no future page load auto-translates.
          clearGoogTransCookie();
          // Tear down immediately — don't wait 500ms. The React translationResetKey
          // will unmount + remount the entire page tree with fresh English JSX, so
          // we don't need Google to "un-translate" visible text. The 500ms wait was
          // the root cause of scroll re-translation: during that window Google's
          // MutationObserver was still alive and re-translated React-rendered nodes
          // as they appeared (e.g. lazy sections, scroll-triggered re-renders).
          window.__ipmTearDownGoogleTranslate();
          return;
        }

        // Non-English path. If the widget was torn down by a previous English switch,
        // queue the language and re-inject the loader script.
        if (!window.__ipmGoogleTranslateReady) {
          window.__ipmPendingLang = lang;
          window.__ipmLoadGoogleTranslateScript();
        }

        var tryTranslate = function(attempts) {
          var select = document.querySelector('.goog-te-combo');
          // Retry if widget hasn't injected the combo yet, or if the options list
          // isn't populated yet (select exists but has <=1 options means still loading).
          if (!select || select.options.length <= 1) {
            if (attempts > 0) setTimeout(function () { tryTranslate(attempts - 1); }, 300);
            return;
          }
          // Always clear any stale googtrans cookie first (e.g. a previously manually
          // selected Abkhaz or other language from an earlier session) before setting
          // the new one, so there is never a conflicting cookie that Google reads first.
          clearGoogTransCookie();
          setGoogTransCookie(googleLang);
          select.value = googleLang;
          // If the value didn't stick (language code not in options), log and bail rather
          // than silently translating to whatever the first option is (often Abkhaz).
          if (select.value !== googleLang) {
            console.warn('[IPM] Google Translate: language code not found in combo:', googleLang);
            return;
          }
          select.dispatchEvent(new Event('change'));
        };
        tryTranslate(25);
      };
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit" async data-ipm-gt-loader="1"></script>
